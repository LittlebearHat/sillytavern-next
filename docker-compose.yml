# ============================================================
# SillyTavern Next - Docker Compose
# 用法：
#   1. cp .env.example .env
#   2. 编辑 .env，至少设置 AUTH_SECRET（openssl rand -hex 32）
#   3. docker compose up -d
#   4. 访问 http://localhost:3000，默认账号 admin/admin
# ============================================================

services:
  sillytavern:
    build: .
    image: sillytavern-next:latest
    container_name: sillytavern-next
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      # SQLite 数据库持久化（请勿删除此卷映射）
      - ./data:/app/data
    environment:
      NODE_ENV: production
      # === 必填 ===
      AUTH_SECRET: ${AUTH_SECRET:?请在 .env 中设置 AUTH_SECRET，可用 openssl rand -hex 32 生成}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      DATABASE_URL: /app/data/sillytavern.db
      # === 可选：AI 提供商默认 Key（推荐登录后在 UI 中按用户配置）===
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health", "||", "exit", "1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
