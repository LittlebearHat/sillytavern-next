name: release-please

# 监听 main 分支推送：
# - 累积自上次 tag 以来的 conventional commits
# - 自动创建/更新一条 release PR（自动 bump 版本 + 写 CHANGELOG）
# - 该 PR 合并后：自动打 tag、创建 GitHub Release
# 文档：https://github.com/googleapis/release-please-action

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
